name: CI

on:
  pull_request:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.9.0

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check documentation structure
        run: pnpm check:docs

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Pack npm artifact
        run: pnpm --filter @cashew-dev/agent-pulse pack
